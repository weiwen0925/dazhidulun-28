<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<meta content="noindex,nofollow,noarchive,nosnippet,noimageindex" name="robots"/>
<meta content="noindex,nofollow,noarchive,nosnippet,noimageindex" name="googlebot"/>
<meta content="no-training,no-scraping" name="ai-content-declaration"/>
<title>大智度論 · 卷二十八 · 第1-5品彙整本</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&amp;family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<style>

:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:76px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;--primary:#2C1810;--primary-light:#5B3A29;--shadow:rgba(91,58,41,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;-webkit-user-drag:none;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  background:var(--bg);color:var(--text);
  font-size:20px;line-height:1.85;
  -webkit-font-smoothing:antialiased;
}
img{-webkit-user-drag:none;pointer-events:none;}

/* === Sidebar === */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;padding:0 4px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:5px 4px;border-radius:6px;text-decoration:none;color:var(--sbText);
  cursor:pointer;transition:all .25s;width:100%;}
.sb-item:hover{background:rgba(184,134,11,.12);color:var(--goldL);}
.sb-circle{display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:50%;
  border:1.5px solid rgba(212,196,168,.4);
  font-family:"Noto Sans TC",sans-serif;font-size:15px;font-weight:600;
  transition:all .3s;}
.sb-label{font-size:11.5px;letter-spacing:.5px;text-align:center;line-height:1.3;
  font-family:"Noto Sans TC",sans-serif;}
.sb-item.active .sb-circle{background:var(--gold);color:#fff;border-color:var(--gold);
  box-shadow:0 0 12px rgba(184,134,11,.5);}
.sb-item.active{color:var(--goldL);}

#sbToggle{display:none;position:fixed;top:14px;left:14px;z-index:200;
  width:42px;height:42px;border-radius:8px;border:0;
  background:var(--sbBg);color:var(--gold);font-size:22px;cursor:pointer;}

/* === Progress capsule === */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;
}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* === Main === */
.main{margin-left:var(--sbW);min-height:100vh;}

/* === Hero === */
.site-hero{
  background:linear-gradient(135deg,#1a1410 0%,#2a2218 40%,#3d3225 70%,#2a2218 100%);
  color:#fff;padding:80px 40px 76px;text-align:center;
  position:relative;overflow:hidden;
}
.site-hero::before{
  content:"隨喜";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:380px;color:rgba(212,168,75,.04);
  font-weight:900;letter-spacing:30px;pointer-events:none;
  white-space:nowrap;
}
.site-hero > *{position:relative;z-index:2;}
.hero-juan{font-family:"Noto Sans TC",sans-serif;
  font-size:15px;letter-spacing:6px;color:var(--goldL);
  margin-bottom:18px;opacity:.85;}
.hero-title{font-size:56px;font-weight:900;letter-spacing:8px;
  background:linear-gradient(135deg,#f5d99a,#d4a84b,#f5d99a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:18px;line-height:1.25;}
.hero-subtitle{font-size:20px;letter-spacing:5px;color:#e8d8b8;
  margin-bottom:14px;font-weight:500;}
.hero-sub{font-size:18px;color:#c4b59a;line-height:1.7;
  max-width:780px;margin:0 auto 16px;}
.hero-meta{font-size:17px;color:#a89878;letter-spacing:1.5px;
  font-family:"Noto Sans TC",sans-serif;margin-top:14px;}
.hero-range{display:inline-block;margin-top:18px;font-size:15px;
  border:1px solid rgba(212,168,75,.4);padding:8px 24px;border-radius:20px;
  color:var(--goldL);font-family:"Noto Sans TC",sans-serif;letter-spacing:3px;}

/* === Preface === */
.preface{max-width:880px;margin:48px auto;padding:0 32px;}
.preface-title{font-size:30px;color:var(--accent);text-align:center;
  letter-spacing:5px;margin-bottom:22px;font-weight:700;}
.preface-title::after{content:"";display:block;width:60px;height:3px;
  background:var(--gold);margin:12px auto 0;border-radius:2px;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);
  margin-bottom:14px;text-indent:2em;}

/* === TOC === */
.toc-section{max-width:1100px;margin:24px auto 60px;padding:0 32px;}
.toc-title{font-size:34px;color:var(--accent);text-align:center;
  letter-spacing:8px;margin-bottom:14px;font-weight:700;}
.toc-title::after{content:"";display:block;width:80px;height:3px;
  background:linear-gradient(90deg,var(--gold),var(--goldL));margin:14px auto 0;border-radius:2px;}
.toc-desc{font-size:17px;text-align:center;color:var(--text-muted);
  margin-bottom:36px;letter-spacing:2px;
  font-family:"Noto Sans TC",sans-serif;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:14px;}
.toc-card{background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:18px 22px;text-decoration:none;color:var(--text);
  display:flex;align-items:flex-start;gap:14px;
  transition:all .25s;cursor:pointer;
  box-shadow:0 1px 3px var(--shadow);}
.toc-card:hover{border-color:var(--gold);transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(184,134,11,.18);}
.toc-num{flex-shrink:0;width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-size:17px;font-weight:700;}
.toc-info{flex:1;min-width:0;}
.toc-name{font-size:19.5px;font-weight:700;color:var(--accent);
  margin-bottom:4px;line-height:1.5;}
.toc-sub{font-size:14px;color:var(--text-muted);line-height:1.5;
  font-family:"Noto Sans TC",sans-serif;}

/* === Chapters === */
.chapter{margin:0;padding:0;}
.ch-head{
  background:var(--headGrad);color:#fff;
  padding:60px 40px 56px;text-align:center;position:relative;
  border-top:1px solid rgba(212,168,75,.2);
}
.ch-head::after{content:"";position:absolute;bottom:18px;left:50%;
  transform:translateX(-50%);width:80px;height:2px;
  background:linear-gradient(90deg,transparent,var(--goldL),transparent);}
.ch-num{font-family:"Noto Sans TC",sans-serif;
  font-size:18px;letter-spacing:6px;color:var(--goldL);margin-bottom:16px;opacity:.92;}
.ch-name{font-size:34px;font-weight:900;letter-spacing:5px;
  margin-bottom:14px;line-height:1.4;
  background:linear-gradient(135deg,#f5d99a,#d4a84b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;}
.ch-sub{font-size:17px;color:#c4b59a;letter-spacing:2px;line-height:1.6;
  max-width:760px;margin:0 auto;}

.ch-body{max-width:920px;margin:0 auto;padding:40px 32px 50px;}

/* === Bridges === */
.bridge{
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);
  border-left:5px solid var(--gold);
  border-radius:10px;
  padding:20px 26px;margin:0 0 30px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);
}
.bridge-outro{
  border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin:32px 0 6px;
}
.bridge-label{display:inline-block;
  font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
  background:var(--gold);color:#fff;
  padding:3px 12px;border-radius:12px;
  letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0 0 8px;color:var(--text2);line-height:2.05;font-size:18.5px;}
.bridge p:last-child{margin-bottom:0;}

/* === Section headings === */
h2{font-size:28px;font-weight:700;color:var(--accent);
  margin:30px 0 18px;padding:10px 0 10px 20px;
  border-left:4px solid var(--gold);
  background:linear-gradient(90deg,rgba(184,134,11,.07),transparent 65%);
  letter-spacing:2px;line-height:1.5;}
h3{font-size:23px;font-weight:700;color:var(--accent);
  margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border-light);
  letter-spacing:1px;}
h4{font-size:20px;font-weight:600;color:var(--text2);margin:18px 0 10px;}
h5{font-size:18px;font-weight:600;color:var(--gold);margin:14px 0 8px;
  letter-spacing:1px;}

/* === Paragraphs === */
.ch-body p{margin:0 0 14px;line-height:1.95;font-size:20px;}
.ch-body p.indent{text-indent:2em;}

strong,b{color:var(--accent-red);font-weight:700;}
em{font-style:italic;color:var(--accent);}

/* === Classical text (經/論) === */
.classical-text{
  background:#FFFDF5;border:1px solid #E8E0D0;
  border-radius:10px;padding:18px 24px;margin:18px 0;
  line-height:2.05;font-size:20px;
  position:relative;
}
.text-label{display:inline-block;
  font-family:"Noto Sans TC",sans-serif;font-size:13.5px;
  background:var(--accent);color:#fff;
  padding:3px 14px;border-radius:12px;
  letter-spacing:3px;margin-bottom:12px;}
.text-label.jing{background:#8B2500;}
.text-label.lun{background:var(--accent);}
.text-label.q{background:#2563a8;}
.text-label.a{background:var(--gold);}

/* === Verse / Gatha === */
.verse,.gatha,blockquote{
  background:var(--verseBg);
  border-left:4px solid var(--verseBd);
  padding:18px 26px;margin:18px 0;
  line-height:2.2;font-size:22px;
  text-align:center;color:var(--accent);
  white-space:normal;font-weight:500;
  border-radius:0 8px 8px 0;
}
.verse-kou{font-size:24px;font-weight:600;letter-spacing:3px;color:var(--accent-red);
  text-align:center;line-height:2;margin:24px 0;
  padding:24px;background:linear-gradient(135deg,#fdf5e8,#f0e3c4);
  border:2px solid var(--gold);border-radius:12px;
  box-shadow:0 4px 18px rgba(184,134,11,.15);}

/* === Cards === */
.card,.insight,.commentary,.practice,.metaphor,.note{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:18px 24px;margin:16px 0;
  box-shadow:0 1px 3px var(--shadow);
}
.card-title{font-size:21.5px;color:var(--accent);font-weight:700;margin-bottom:10px;
  letter-spacing:1px;}
.card-content,.card-desc{font-size:20px;line-height:1.95;color:var(--text2);}

/* === Q&A === */
.qa{margin:18px 0;}
.qa .q{background:#eef4fd;border-left:4px solid #2563a8;
  padding:14px 20px;margin-bottom:8px;font-size:20px;line-height:1.95;
  border-radius:0 8px 8px 0;color:#1a3d6a;}
.qa .a{background:#fdf6ec;border-left:4px solid var(--accentL);
  padding:14px 20px;font-size:20px;line-height:1.95;
  border-radius:0 8px 8px 0;color:var(--text);}
.qa .q strong,.qa .a strong{font-weight:700;}

/* === Four grid === */
.four-grid{display:grid;grid-template-columns:repeat(2,1fr);
  gap:14px;margin:20px 0;}
.four-grid .cell{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:16px 20px;font-size:19px;line-height:1.85;}
.four-grid .cell-title{font-size:17px;font-weight:700;color:var(--gold);
  margin-bottom:8px;letter-spacing:1px;font-family:"Noto Sans TC",sans-serif;}

/* === Three col === */
.three-col{display:grid;grid-template-columns:repeat(3,1fr);
  gap:14px;margin:20px 0;}
.three-col .col{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:16px 18px;font-size:18px;line-height:1.8;
  text-align:center;}
.three-col .col-title{font-size:17px;font-weight:700;color:var(--accent);
  margin-bottom:8px;}

/* === Two col compare === */
.two-col{display:grid;grid-template-columns:repeat(2,1fr);
  gap:16px;margin:20px 0;}
.two-col .col{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:18px 22px;font-size:19px;line-height:1.9;}
.two-col .col.col-a{border-top:4px solid #6b7280;}
.two-col .col.col-b{border-top:4px solid var(--gold);
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);}
.two-col .col-title{font-size:19px;font-weight:700;margin-bottom:10px;
  letter-spacing:1px;}
.two-col .col-a .col-title{color:#6b7280;}
.two-col .col-b .col-title{color:var(--gold);}
.two-col .col-formula{font-family:"Noto Sans TC",sans-serif;
  font-size:16px;color:var(--text-muted);margin-top:10px;
  padding-top:8px;border-top:1px dashed var(--border-light);}

/* === Flow === */
.flow{display:flex;flex-wrap:wrap;gap:10px;align-items:center;
  justify-content:center;margin:20px 0;
  padding:18px;background:var(--card);border:1px solid var(--border);
  border-radius:10px;}
.flow.flow-v{flex-direction:column;}
.flow-box{background:linear-gradient(135deg,#fdf5e0,#f0e3c4);
  border:1px solid var(--gold);border-radius:8px;
  padding:14px 22px;text-align:center;font-size:17.5px;line-height:1.5;
  min-width:140px;color:var(--accent);font-weight:600;}
.flow-box small{display:block;font-size:13px;color:var(--text-muted);
  margin-top:4px;font-weight:400;font-family:"Noto Sans TC",sans-serif;}
.flow-arrow{font-size:24px;color:var(--gold);font-weight:700;}

/* === Variable chain (equation) === */
.equation{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:8px;margin:24px 0;padding:24px 18px;
  background:linear-gradient(135deg,#1f1a14,#3d3225);
  border-radius:12px;border:1px solid var(--gold);}
.eq-term{display:inline-flex;flex-direction:column;align-items:center;
  padding:10px 16px;color:#f5d99a;font-size:20px;font-weight:700;
  background:rgba(184,134,11,.18);border-radius:8px;min-width:90px;}
.eq-term small{font-size:13px;font-weight:400;color:#c4b59a;margin-top:4px;
  font-family:"Noto Sans TC",sans-serif;letter-spacing:1px;}
.eq-op{font-size:28px;color:var(--goldL);font-weight:700;padding:0 4px;}
.eq-result{background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff;}

/* === Variable cards === */
.var-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;margin:22px 0;}
.var-card{background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:18px;text-align:center;
  box-shadow:0 2px 6px var(--shadow);}
.var-icon{font-size:32px;color:var(--gold);margin-bottom:8px;}
.var-name{font-size:18px;color:var(--accent);font-weight:700;
  letter-spacing:1.5px;margin-bottom:4px;}
.var-en{font-size:13px;color:var(--text-muted);
  font-family:"Noto Sans TC",sans-serif;letter-spacing:1px;}

/* === Lever diagram === */
.lever-chart{background:linear-gradient(135deg,#1f1a14,#2a2218);
  border-radius:12px;padding:30px 24px;margin:24px 0;
  border:1px solid rgba(184,134,11,.3);}
.lever-title{color:var(--goldL);font-size:22px;text-align:center;
  margin-bottom:24px;letter-spacing:3px;font-weight:700;}
.lever-rows{display:grid;gap:14px;}
.lever-row{display:grid;grid-template-columns:120px 1fr 120px;
  align-items:center;gap:14px;}
.lever-row .label{color:#c4b59a;font-size:16px;text-align:right;
  font-family:"Noto Sans TC",sans-serif;letter-spacing:1px;}
.lever-row .bar{height:14px;border-radius:8px;
  background:rgba(212,168,75,.12);position:relative;overflow:hidden;}
.lever-row .bar-fill{position:absolute;left:0;top:0;height:100%;
  background:linear-gradient(90deg,#aaa,#ddd);border-radius:8px;}
.lever-row .bar-fill.gold{background:linear-gradient(90deg,var(--gold),var(--goldL),#f5d99a);
  box-shadow:0 0 18px rgba(212,168,75,.4);}
.lever-row .formula{color:#c4b59a;font-size:15px;
  font-family:"Noto Sans TC",sans-serif;letter-spacing:1px;}

/* === Venn === */
.venn-wrap{display:flex;align-items:center;justify-content:center;
  min-height:280px;margin:24px 0;gap:0;flex-wrap:wrap;position:relative;}
.venn-circle{display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  width:220px;height:220px;border-radius:50%;
  border:2px solid rgba(184,134,11,.5);
  background:radial-gradient(circle,rgba(184,134,11,.08),transparent 70%);
  font-size:16px;line-height:1.55;color:var(--accent);font-weight:600;
  padding:0 22px;box-sizing:border-box;gap:6px;
  text-align:center;}
.venn-circle small{font-size:12.5px;display:block;
  width:100%;text-align:center;line-height:1.4;color:var(--text-muted);font-weight:400;
  font-family:"Noto Sans TC",sans-serif;}
.venn-a{margin-right:-50px;}
.venn-b{margin-left:-50px;background:radial-gradient(circle,rgba(212,168,75,.12),transparent 70%);}
.venn-c{margin-top:-160px;background:radial-gradient(circle,rgba(184,134,11,.1),transparent 70%);}
.venn-core{position:absolute;left:50%;top:50%;transform:translate(-50%,-30%);
  width:90px;height:90px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,168,75,.95),rgba(184,134,11,.7));
  display:flex;align-items:center;justify-content:center;
  color:#1a1410;font-size:24px;font-weight:900;letter-spacing:2px;
  box-shadow:0 0 30px rgba(212,168,75,.6);}

/* === Checklist === */
.checklist{list-style:none;padding:0;margin:18px 0;}
.checklist li{position:relative;padding:14px 20px 14px 56px;
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;margin-bottom:10px;font-size:19px;line-height:1.8;
  color:var(--text);box-shadow:0 1px 3px var(--shadow);}
.checklist li::before{content:"";position:absolute;left:18px;top:50%;
  transform:translateY(-50%);width:24px;height:24px;border-radius:6px;
  border:2px solid var(--gold);background:#fff;}
.checklist li strong{color:var(--accent);margin-right:6px;}

/* === Spectrum === */
.spectrum{display:grid;grid-template-columns:1fr 2fr 1fr;
  align-items:center;gap:0;margin:24px 0;
  background:linear-gradient(90deg,#e0e0e0 0%,#fdf5e0 50%,var(--gold) 100%);
  padding:16px;border-radius:12px;color:var(--text);}
.spectrum .sp-node{text-align:center;font-size:15.5px;font-weight:700;}
.spectrum .sp-mid{text-align:center;color:#fff;font-size:15px;
  text-shadow:0 1px 3px rgba(0,0,0,.25);}

/* === Six attribute spokes === */
.six-spokes{display:grid;grid-template-columns:repeat(3,1fr);
  gap:14px;margin:24px 0;}
.spoke{background:linear-gradient(135deg,#fdf5e0,#f0e3c4);
  border:1px solid var(--gold);border-radius:10px;
  padding:16px 18px;text-align:center;
  box-shadow:0 2px 8px rgba(184,134,11,.15);}
.spoke-title{font-size:21px;color:var(--accent-red);font-weight:700;
  margin-bottom:6px;letter-spacing:2px;}
.spoke-sub{font-size:15px;color:var(--accent);letter-spacing:1px;
  font-family:"Noto Sans TC",sans-serif;margin-bottom:8px;}
.spoke-desc{font-size:16px;color:var(--text2);line-height:1.7;}

/* === Triangle === */
.triangle-diagram{display:grid;grid-template-columns:repeat(3,1fr);
  gap:14px;margin:24px 0;padding:24px;
  background:linear-gradient(135deg,#1f1a14,#3d3225);
  border-radius:12px;border:1px solid rgba(184,134,11,.3);}
.tri-node{text-align:center;padding:16px;border-radius:10px;
  background:rgba(212,168,75,.1);color:#f5d99a;font-size:17px;
  font-weight:600;line-height:1.5;}
.tri-node small{display:block;font-size:13px;color:#c4b59a;margin-top:6px;
  font-family:"Noto Sans TC",sans-serif;font-weight:400;}

/* === Next link === */
.next-link{display:inline-block;margin-top:30px;padding:12px 28px;
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff;text-decoration:none;border-radius:24px;
  font-size:17px;letter-spacing:3px;font-family:"Noto Sans TC",sans-serif;
  transition:all .25s;box-shadow:0 3px 12px rgba(184,134,11,.3);}
.next-link:hover{transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(184,134,11,.4);}

/* === Back to top === */
#backTop{position:fixed;right:24px;bottom:80px;width:44px;height:44px;
  border-radius:50%;background:var(--sbBg);color:var(--gold);
  border:1px solid var(--gold);font-size:20px;cursor:pointer;
  display:none;align-items:center;justify-content:center;z-index:110;
  transition:all .3s;}
#backTop.show{display:flex;}
#backTop:hover{background:var(--gold);color:#fff;}

/* === Footer === */
.site-footer{background:var(--sbBg);color:var(--sbText);
  text-align:center;padding:40px 32px 36px;margin-top:40px;
  border-top:1px solid var(--border);}
.footer-verse{font-size:18px;line-height:2;color:var(--goldL);
  margin-bottom:18px;font-weight:500;letter-spacing:2px;}
.footer-meta{font-size:15px;color:#a89878;line-height:1.7;letter-spacing:1px;
  font-family:"Noto Sans TC",sans-serif;}

/* === Anchor offset === */
.chapter{scroll-margin-top:20px;}
section[id]{scroll-margin-top:20px;}

/* === Responsive === */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .site-hero{padding:60px 24px;}
  .site-hero::before{font-size:200px;letter-spacing:10px;}
  .hero-title{font-size:38px;letter-spacing:4px;}
  .ch-body{padding:30px 22px 40px;}
  .ch-head{padding:46px 22px 40px;}
  .ch-name{font-size:26px;letter-spacing:3px;}
  .four-grid,.three-col,.two-col,.six-spokes,.triangle-diagram{
    grid-template-columns:1fr;}
  .lever-row{grid-template-columns:80px 1fr 100px;}
  .equation{flex-direction:column;gap:6px;}
  .eq-op{transform:rotate(90deg);padding:4px 0;}
  body{font-size:17px;}
  .ch-body p{font-size:17px;}
}
@media (max-width:600px){
  .hero-title{font-size:30px;}
  .preface-title,.toc-title{font-size:24px;}
  h2{font-size:22px;}
  h3{font-size:19px;}
}


/* ===== 多檔合併模式 · iframe 與補強樣式 ===== */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
  border:1px solid var(--border);border-radius:12px;

.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;

.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;}
.next-link{display:inline-block;margin:6px 0 4px;font-family:"Noto Sans TC",sans-serif;
  font-size:17px;color:var(--accent);text-decoration:none;letter-spacing:1px;

<script>
(function(){
  // ── 防複製保護（外層）──
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);
  });
  document.addEventListener('mousedown',function(e){if(e.button===2)blk(e);},true);
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);

  // ── 閱讀進度膠囊 ──
  var rpFill=document.getElementById('rpFill');
  var rpPct=document.getElementById('rpPct');
  function updateProgress(){
    var sh=document.documentElement.scrollHeight-window.innerHeight;
    var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
    if(rpFill)rpFill.style.width=pct+'%';
    if(rpPct)rpPct.textContent=Math.round(pct)+'%';
  }
  window.addEventListener('scroll',updateProgress,{passive:true});
  updateProgress();

  // ── 接近頁尾時膠囊淡出 ──
  (function(){
    var cap=document.getElementById('readProgress');
    if(!cap)return;
    function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
    var targets=[];
    var f1=document.querySelector('[data-wy-notice="v2"]');
    if(f1)targets.push(f1);
    var f2=document.querySelector('.site-footer');
    if(f2)targets.push(f2);
    if(!targets.length)return;
    if('IntersectionObserver' in window){
      var io=new IntersectionObserver(function(es){
        setHide(es.some(function(e){return e.isIntersecting;}));
      },{root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
      targets.forEach(function(t){io.observe(t);});
    }else{
      window.addEventListener('scroll',function(){
        var dh=document.documentElement.scrollHeight;
        setHide(dh-(window.scrollY+window.innerHeight)<240);
      },{passive:true});
    }
  })();

  // ── iframe 自動高度（只量 body.scrollHeight，無 buffer）──
  function resizeFrame(f){
    try{
      var d=f.contentDocument||f.contentWindow.document;
      if(!d||!d.body)return;
      d.body.style.minHeight='0';d.body.style.height='auto';
      if(d.documentElement){
        d.documentElement.style.minHeight='0';
        d.documentElement.style.height='auto';
      }
      var h=d.body.scrollHeight;
      if(h>100){f.style.height=h+'px';f.style.minHeight='0';}
    }catch(e){}
  }
  function resizeAllFrames(){
    document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
    updateProgress();
  }
  function setupFrame(f){
    var tries=0;
    function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
    if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}
    else{f.addEventListener('load',tick);}
  }
  document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
  var rzT;
  window.addEventListener('resize',function(){
    clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);
  });
  var _rt=0,_riv=setInterval(function(){
    _rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);
  },300);

  // ── 錨點點擊防錯跳 ──
  document.addEventListener('click',function(e){
    var a=e.target;
    while(a&&a.tagName!=='A')a=a.parentElement;
    if(!a)return;
    var h=a.getAttribute('href');
    if(!h||h.charAt(0)!=='#'||h.length<2)return;
    var id=h.substring(1);
    var el=document.getElementById(id);
    if(!el)return;
    e.preventDefault();
    resizeAllFrames();
    setTimeout(function(){
      resizeAllFrames();
      var rect=el.getBoundingClientRect();
      var y=window.scrollY+rect.top-20;
      window.scrollTo({top:y,behavior:'smooth'});
    },60);
  },true);

  // ── 側欄高亮 ──
  var sbItems=Array.prototype.slice.call(document.querySelectorAll('.sb-item'));
  var chapters=Array.prototype.slice.call(document.querySelectorAll('section.chapter'));
  function highlight(){
    var idx=-1;
    for(var i=0;i<chapters.length;i++){
      if(chapters[i].getBoundingClientRect().top<window.innerHeight*0.35)idx=i;
    }
    sbItems.forEach(function(it,i){it.classList.toggle('active',i===idx);});
  }
  window.addEventListener('scroll',highlight,{passive:true});
  highlight();

  // ── sticky 卷名回頂 ──
  var sbBrand=document.getElementById('sbBrand');
  if(sbBrand){
    sbBrand.addEventListener('click',function(e){
      e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});
    });
  }

  // ── 漢堡選單 ──
  var sbToggle=document.getElementById('sbToggle');
  var sb=document.getElementById('sb');
  if(sbToggle&&sb){
    sbToggle.addEventListener('click',function(){sb.classList.toggle('open');});
  }

  // ── 回頂按鈕 ──
  var backTop=document.getElementById('backTop');
  if(backTop){
    window.addEventListener('scroll',function(){
      backTop.classList.toggle('show',window.scrollY>600);
    },{passive:true});
    backTop.addEventListener('click',function(){
      window.scrollTo({top:0,behavior:'smooth'});
    });
  }
})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-28-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
